title: "Control Systems Engineering Field Guide"
description: "Practical standards guidance, design workflows, commissioning references, and engineering tools for industrial automation."
baseurl: "/Control-System-Tools"
url: "https://kyawminthu20.github.io"

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-redirect-from

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  # Internal design/plan docs — not part of the public site
  - plans/
  - superpowers/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
