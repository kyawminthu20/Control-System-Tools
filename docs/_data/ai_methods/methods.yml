  "STATUS": "DRAFT",
  "authority_levels": [
    {"level": 0, "label": "Offline", "meaning": "No live plant input or action"},
    {"level": 1, "label": "Read-only", "meaning": "Observes live data but cannot request action"},
    {"level": 2, "label": "Advisory", "meaning": "Recommends; a person decides"},
    {"level": 3, "label": "Operator-approved", "meaning": "Prepares an action that requires explicit approval"},
    {"level": 4, "label": "Bounded supervisory", "meaning": "Acts only inside independent limits and vetoes"},
    {"level": 5, "label": "Direct closed-loop", "meaning": "Direct control; no learned method is assigned this level here"}
  ],
  "methods": [
    {"id":"pid_control","method":"PID control","family":"classical-deterministic","does":"Computes control effort from present, accumulated, and rate error.","example":"Holding a pump discharge pressure at setpoint by trimming the VFD speed each scan.","layer":"device","deterministic_alternative":"On/off or state feedback control","justified_when":"A measurable process has adequate dynamics and a stable operating envelope.","poor_fit_when":"Constraints, long delays, or strong interactions dominate.","data_requirement":"Step tests or operating history for tuning; no training set.","max_authority":5,"authority_basis":"Mature deterministic baseline; project risk assessment still determines permitted control and safety roles.","validation_required":"Loop-direction, saturation, mode-transfer, disturbance, and fail-state tests.","failure_modes":"Windup, noise amplification, oscillation, and hidden mode errors.","safety_independence":"Trips and safety functions remain independent of the basic control loop.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"feedforward_control","method":"Feedforward control","family":"classical-deterministic","does":"Offsets a measured disturbance before feedback error develops.","example":"Adding heater output the moment a cold-feed flow rise is measured, before the outlet temperature falls.","layer":"device","deterministic_alternative":"Feedback-only control","justified_when":"The disturbance is measurable and its process effect is sufficiently known.","poor_fit_when":"Disturbance measurement or model sign and gain are unreliable.","data_requirement":"A validated disturbance-to-output model; no ML training set.","max_authority":5,"authority_basis":"Deterministic control whose deployment authority is established by the project control and risk design.","validation_required":"Sign, scaling, timing, saturation, and feedback-recovery tests.","failure_modes":"Wrong-sign action, timing mismatch, and excessive compensation.","safety_independence":"Independent limits and trips constrain commanded output.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"rule_engine","method":"Rule engine / sequence logic","family":"classical-deterministic","does":"Maps explicit conditions and states to deterministic actions.","example":"Sequencing a filling station: clamp, fill to weight, cap, release, in a reviewed, fully testable state machine.","layer":"device","deterministic_alternative":"Hardwired relay logic or state machine","justified_when":"Required behaviour can be stated, reviewed, and exhaustively tested.","poor_fit_when":"The state space cannot be bounded or requirements are ambiguous.","data_requirement":"Requirements and test cases; no training data.","max_authority":5,"authority_basis":"Deterministic implementation; authority follows verified requirements, not this catalogue.","validation_required":"State, transition, timeout, restart, and abnormal-path coverage.","failure_modes":"Missing transition, conflicting rule, stale latch, and unsafe restart.","safety_independence":"Safety logic uses its required independent and certified architecture.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"kalman_filter","method":"Kalman filter","family":"estimation","does":"Fuses a linear dynamic model and noisy measurements into a state estimate.","example":"Estimating true tank level from a noisy level transmitter fused with the inlet/outlet flow balance.","layer":"device","deterministic_alternative":"Direct measurement or fixed low-pass filtering","justified_when":"The linear model and noise assumptions are adequate and hidden states matter.","poor_fit_when":"Dynamics are strongly nonlinear or noise assumptions are badly violated.","data_requirement":"Model, covariance estimates, and representative disturbances.","max_authority":4,"authority_basis":"Deterministic estimator may support bounded control after project-specific observability and fault analysis.","validation_required":"Innovation residuals, observability, sensor-loss, initialization, and numerical tests.","failure_modes":"Divergence, biased estimate, covariance mismatch, and silent sensor fault absorption.","safety_independence":"Safety decisions do not depend solely on the estimate.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"nonlinear_state_estimator","method":"EKF / UKF nonlinear estimator","family":"estimation","does":"Estimates nonlinear process states using local linearization or sigma points.","example":"Estimating unmeasured reactor concentration from temperature and flow through a validated nonlinear model.","layer":"edge","deterministic_alternative":"Observer, direct sensor, or linear Kalman filter","justified_when":"A nonlinear model is credible and missing states materially improve operation.","poor_fit_when":"The model is weak, states are unobservable, or compute timing is not bounded.","data_requirement":"Validated model, uncertainty assumptions, and transient cases.","max_authority":3,"authority_basis":"Conservative ceiling pending application-specific estimator fault containment.","validation_required":"Monte Carlo transients, residual checks, sensor faults, and timing tests.","failure_modes":"Divergence, local-linearization error, false confidence, and late output.","safety_independence":"Independent sensors and protection remain authoritative.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["cst_control","nist_ai_rmf"]},
    {"id":"moving_horizon_estimation","method":"Moving-horizon estimation","family":"optimisation","does":"Solves a constrained recent-history optimisation to estimate states and disturbances.","example":"Reconciling recent flow, level, and composition history against constraints to estimate an unmeasured disturbance.","layer":"edge","deterministic_alternative":"Kalman filter or deterministic observer","justified_when":"Constraints and nonlinear dynamics justify the compute and engineering cost.","poor_fit_when":"A simple observer is adequate or solve time cannot be guaranteed.","data_requirement":"Process model, constraints, noise assumptions, and transient history.","max_authority":3,"authority_basis":"Bounded use requires deterministic timeout and fallback behaviour.","validation_required":"Feasibility, convergence, worst-case timing, fault injection, and fallback tests.","failure_modes":"Infeasible solve, local optimum, stale estimate, and model mismatch.","safety_independence":"Protection must tolerate estimator loss or error.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"system_identification","method":"System identification","family":"classical-deterministic","does":"Fits a dynamic input-output model from designed or historical excitation.","example":"Fitting a heat-exchanger step-response model offline from a designed bump test, for later controller tuning.","layer":"engineering workstation","deterministic_alternative":"First-principles modelling or manual step-test fit","justified_when":"A model is needed and safe excitation covers the intended envelope.","poor_fit_when":"Inputs lack excitation, data leak future information, or the plant changes materially.","data_requirement":"Time-aligned, sufficiently excited input-output data and validation runs.","max_authority":2,"authority_basis":"Model construction is offline; any downstream controller requires a separate authority case.","validation_required":"Residual independence, held-out transients, stability, and physical-sanity checks.","failure_modes":"Confounding, non-identifiability, extrapolation, and unstable fitted dynamics.","safety_independence":"Identification experiments obey independent operating constraints.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"statistical_process_control","method":"Statistical process control","family":"classical-deterministic","does":"Detects statistically unusual process shifts against an established baseline.","example":"Detecting a slow drift in fill weight against an established stable-baseline control chart.","layer":"historian/analytics","deterministic_alternative":"Engineering limits and alarm rationalisation","justified_when":"The process has a stable baseline and special-cause detection is useful.","poor_fit_when":"Operating modes are mixed or distribution assumptions are ignored.","data_requirement":"Mode-labelled baseline data with known quality.","max_authority":2,"authority_basis":"Advisory quality or maintenance signal; not a safety trip.","validation_required":"False-alarm rate, mode separation, sensitivity, and recalibration review.","failure_modes":"Alarm flooding, missed drift, autocorrelation bias, and baseline contamination.","safety_independence":"Engineered alarms, trips, and product disposition remain independent.","evidence_strength":"mixed","maturity":"industrially routine","sources":["nist_ai_rmf"]},
    {"id":"pca_pls","method":"PCA / PLS latent-variable model","family":"estimation","does":"Compresses correlated variables or predicts a response from latent factors.","example":"Compressing dozens of correlated batch sensors into a few latent trends to spot an off-normal batch.","layer":"historian/analytics","deterministic_alternative":"Selected sensors, mass balance, or linear regression","justified_when":"Variables are correlated and a validated low-dimensional structure is stable.","poor_fit_when":"Modes shift, nonlinearities dominate, or causal interpretation is required.","data_requirement":"Representative, scaled, mode-labelled data with reference responses for PLS.","max_authority":2,"authority_basis":"Advisory ceiling unless an independent application case proves bounded use.","validation_required":"Held-out batches, leverage and residual limits, drift, and missing-data tests.","failure_modes":"Spurious correlation, latent-space extrapolation, leakage, and scaling errors.","safety_independence":"Direct measurements and protection remain authoritative.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["nist_ai_rmf"]},
    {"id":"model_predictive_control","method":"Model predictive control","family":"optimisation","does":"Optimises future manipulated variables against a model and constraints.","example":"Holding a distillation column inside purity and flooding limits while minimising reboiler energy.","layer":"supervisory","deterministic_alternative":"PID, feedforward, selectors, and override control","justified_when":"Interactions and constraints produce measurable value beyond simpler loops.","poor_fit_when":"Models, maintenance capacity, or solve-time guarantees are inadequate.","data_requirement":"Validated dynamic model, constraints, estimator, and disturbance scenarios.","max_authority":4,"authority_basis":"Deterministic bounded supervisory control with independent basic and protective layers.","validation_required":"Constraint, infeasibility, model mismatch, timing, bumpless fallback, and cyber tests.","failure_modes":"Bad model, infeasible optimisation, stale state, and economically unsafe objective.","safety_independence":"SIS, trips, hard limits, and basic regulatory control remain independent.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control","nist_sp80082"]},
    {"id":"robust_mpc_safety_filter","method":"Robust MPC / safety filter","family":"optimisation","does":"Projects a proposed command into a modelled feasible set under uncertainty.","example":"Projecting an operator's proposed setpoint change into a modelled feasible set before it is applied.","layer":"supervisory","deterministic_alternative":"Hard selectors, clamps, permissives, and override control","justified_when":"Uncertainty bounds are credible and constraints are too coupled for simple clamps.","poor_fit_when":"The safe set is incomplete or worst-case solve time is unbounded.","data_requirement":"Verified model, uncertainty set, constraints, and adversarial scenarios.","max_authority":3,"authority_basis":"Phase 49a supports only operator-approved use absent an independently verified veto architecture.","validation_required":"Reachability, infeasibility, timing, uncertainty-bound, and fallback evidence.","failure_modes":"False feasible set, numerical failure, hidden constraint, and unsafe fallback.","safety_independence":"Certified protection and hard interlocks remain outside the filter.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["iec_tr_5469","nist_ai_rmf"]},
    {"id":"first_principles_solver","method":"First-principles numerical model","family":"classical-deterministic","does":"Solves governing physical equations for prediction or estimation.","example":"Solving the governing heat-transfer equations to predict jacket temperature for a new recipe.","layer":"edge","deterministic_alternative":"Empirical correlation or direct measurement","justified_when":"Governing physics and parameters are known well enough for the decision.","poor_fit_when":"Unknown closure relations dominate or solve time exceeds freshness needs.","data_requirement":"Geometry, properties, boundary conditions, and calibration measurements.","max_authority":4,"authority_basis":"Deterministic model; bounded authority still requires verification, timing, and fallback.","validation_required":"Mesh/time convergence, conservation, parameter sensitivity, and plant comparison.","failure_modes":"Wrong boundary condition, numerical instability, parameter error, and stale solve.","safety_independence":"Safety limits rely on independent validated channels.","evidence_strength":"mixed","maturity":"industrially routine","sources":["cst_control"]},
    {"id":"one_dimensional_cnn","method":"1D convolutional neural network","family":"perception","does":"Classifies or embeds local patterns in waveform or time-series windows.","example":"Flagging likely bearing wear from accelerometer windows on a pump train, for inspection at the next stop.","layer":"edge","deterministic_alternative":"Spectral features plus thresholds or a simpler classifier","justified_when":"Raw local patterns add repeatable value across representative machines and loads.","poor_fit_when":"Fault labels are sparse, acquisition changes, or a few engineered features suffice.","data_requirement":"Labelled waveforms spanning assets, loads, sensors, and acquisition conditions.","max_authority":2,"authority_basis":"Advisory diagnostic ceiling; Phase 49a found no basis for learned safety authority.","validation_required":"Asset-held-out tests, shift tests, calibration, latency, drift, and abstention.","failure_modes":"Domain shift, shortcut learning, label leakage, overconfidence, and aliasing.","safety_independence":"Protection never depends on the diagnosis or confidence score.","evidence_strength":"mixed","maturity":"piloted","sources":["nist_ai_rmf","iec_tr_5469"]},
    {"id":"two_dimensional_cnn","method":"2D convolutional neural network","family":"perception","does":"Detects or classifies spatial patterns in images or transformed signals.","example":"Classifying surface-finish defects on parts from line-scan images where rule-based vision falls short.","layer":"edge","deterministic_alternative":"Machine vision rules, gauges, or human inspection","justified_when":"Appearance variation is representatively sampled and rule-based vision is inadequate.","poor_fit_when":"Defects are rare, lighting is uncontrolled, or traceable metrology is required.","data_requirement":"Labelled images across lots, optics, lighting, defects, and acceptable variation.","max_authority":2,"authority_basis":"Advisory or quality-classification ceiling, not a safety function.","validation_required":"Lot-held-out tests, rare-defect recall, calibration, shift, and camera-fault tests.","failure_modes":"Lighting shortcut, missed novel defect, confident misclassification, and camera drift.","safety_independence":"Safety sensing and protective stops remain independent.","evidence_strength":"mixed","maturity":"industrially routine","sources":["nist_ai_rmf","iec_tr_5469"]},
    {"id":"temporal_transformer","method":"Temporal transformer","family":"perception","does":"Models long-range dependencies in multivariate event or sensor sequences.","example":"Predicting a developing process upset from long multivariate sensor and event history, as an operator advisory.","layer":"historian/analytics","deterministic_alternative":"State machine, AR model, engineered windows, or smaller recurrent model","justified_when":"Long context adds validated value that simpler temporal models do not deliver.","poor_fit_when":"Data volume, timing, or interpretability cannot support the complexity.","data_requirement":"Large time-aligned sequences with mode, maintenance, and outcome labels.","max_authority":2,"authority_basis":"Conservative advisory ceiling under the NIST AI risk-management lifecycle.","validation_required":"Temporal split, leakage audit, calibration, shift, ablation, and latency tests.","failure_modes":"Future leakage, mode confounding, attention instability, drift, and high compute.","safety_independence":"Independent alarms and trips remain effective during wrong or missing predictions.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["nist_ai_rmf","iec_tr_5469"]},
    {"id":"autoencoder_anomaly_detection","method":"Autoencoder anomaly detection","family":"perception","does":"Flags samples that reconstruct poorly relative to learned normal data.","example":"Flagging a compressor operating pattern that reconstructs poorly against learned normal running, for investigation.","layer":"edge","deterministic_alternative":"Limits, residuals, SPC, or one-class statistical model","justified_when":"Normal operation is well sampled and unknown deviations merit investigation.","poor_fit_when":"Normal modes evolve rapidly or anomaly scores cannot be tied to action.","data_requirement":"Clean, representative normal data plus known faults for challenge testing.","max_authority":2,"authority_basis":"Anomaly score is advisory because unknown does not establish hazardous or faulty state.","validation_required":"Known-fault challenge, false-alarm, mode, shift, calibration, and abstention tests.","failure_modes":"Normal-data contamination, mode alarm, missed familiar anomaly, and opaque score.","safety_independence":"Engineered protections cannot be replaced by anomaly detection.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["nist_ai_rmf"]},
    {"id":"gradient_boosted_trees","method":"Gradient-boosted trees","family":"estimation","does":"Predicts a class or value using an ensemble of sequential decision trees.","example":"Predicting product quality grade from tabular process settings, held out by asset, as a lab-check advisory.","layer":"edge","deterministic_alternative":"Rules, linear model, or physics-based correlation","justified_when":"Tabular nonlinear interactions are stable and beat simpler baselines on held-out assets.","poor_fit_when":"Extrapolation or causal physical behaviour is required.","data_requirement":"Representative labelled tabular data with leakage-safe splits.","max_authority":2,"authority_basis":"Advisory ceiling; explainability does not establish safe authority.","validation_required":"Asset/time holdout, calibration, shift, missing-input, fairness, and drift tests.","failure_modes":"Leakage, threshold discontinuity, missing-value shortcut, and extrapolation error.","safety_independence":"Independent sensors and limits remain authoritative.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["nist_ai_rmf"]},
    {"id":"gaussian_process","method":"Gaussian-process regression","family":"estimation","does":"Predicts a quantity with a kernel-based uncertainty estimate.","example":"Estimating a hard-to-measure yield with calibrated uncertainty from a small, modest-dimension dataset.","layer":"edge","deterministic_alternative":"Physical correlation, interpolation, or linear regression","justified_when":"Data are limited, dimensionality is modest, and calibrated uncertainty is valuable.","poor_fit_when":"Datasets are large, inputs are high-dimensional, or kernel assumptions fail.","data_requirement":"Representative input-output samples and justified kernel design.","max_authority":2,"authority_basis":"Uncertainty is model-dependent; use remains advisory without a separate bounded case.","validation_required":"Coverage calibration, out-of-domain challenge, sensitivity, and compute tests.","failure_modes":"False uncertainty, kernel misspecification, scaling cost, and extrapolation.","safety_independence":"Protection does not rely on posterior confidence.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["nist_ai_rmf"]},
    {"id":"learned_soft_sensor","method":"Learned soft sensor","family":"estimation","does":"Infers a difficult-to-measure process variable from easier measurements.","example":"Inferring a stream composition between lab assays from temperature, pressure, and flow measurements.","layer":"edge","deterministic_alternative":"Physical sensor, material balance, or PLS model","justified_when":"Reference measurements cover the operating envelope and maintenance value is clear.","poor_fit_when":"The target cannot be periodically measured or input sensors share common failures.","data_requirement":"Time-aligned reference assays or sensors across modes, lots, and drift.","max_authority":2,"authority_basis":"Advisory ceiling because inferred measurement is vulnerable to drift and shared-cause error.","validation_required":"Time/lot holdout, uncertainty, sensor-fault, drift, and reference-reconciliation tests.","failure_modes":"Target drift, lag mismatch, shared sensor bias, and confident extrapolation.","safety_independence":"Independent direct measurement or conservative limits protect critical decisions.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["nist_ai_rmf"]},
    {"id":"pinn_forward_model","method":"PINN forward model","family":"physics-informed","does":"Fits a neural approximation while penalising governing-equation residuals.","example":"Approximating a repeated diffusion solve as a research alternative to a numerical solver, benchmarked against it.","layer":"engineering workstation","deterministic_alternative":"Finite-volume, finite-element, or ordinary differential equation solver","justified_when":"A differentiable physics prior and repeated-query need survive comparison with numerical solvers.","poor_fit_when":"Classical numerics are accurate and affordable or stiff/multiscale optimisation fails.","data_requirement":"Equations, boundary conditions, collocation points, and validation measurements.","max_authority":1,"authority_basis":"Phase 49a failure evidence supports read-only use; classical numerics remain the baseline.","validation_required":"Conservation, boundary residual, mesh-independent reference, extrapolation, and repeatability tests.","failure_modes":"Optimisation failure, spectral bias, nonunique fit, and deceptively low aggregate loss.","safety_independence":"No safety or loop-closing decision relies on the PINN output.","evidence_strength":"peer-reviewed","maturity":"research","sources":["pinn_raissi","pinn_failure","pinn_numerics"]},
    {"id":"pinn_inverse_model","method":"PINN inverse parameter model","family":"physics-informed","does":"Infers model parameters or hidden fields while enforcing equation residuals.","example":"Recovering an unknown diffusivity field from sensor data while enforcing the governing-equation residual, in research.","layer":"engineering workstation","deterministic_alternative":"Constrained optimisation around a numerical solver","justified_when":"The inverse problem is identifiable and PINN performance beats the numerical baseline.","poor_fit_when":"Parameters are non-identifiable or boundary data are incomplete.","data_requirement":"Governing equations, informative measurements, uncertainty, and synthetic recovery cases.","max_authority":1,"authority_basis":"Read-only ceiling due inverse non-uniqueness and documented PINN training failures.","validation_required":"Parameter-recovery studies, identifiability, noise, multiple starts, and solver comparison.","failure_modes":"Plausible wrong parameter, compensating errors, local minimum, and false confidence.","safety_independence":"Inferred parameters cannot directly change protective settings.","evidence_strength":"peer-reviewed","maturity":"research","sources":["pinn_raissi","pinn_failure","pinn_numerics"]},
    {"id":"hybrid_residual_model","method":"Hybrid physics plus learned residual","family":"physics-informed","does":"Adds a learned correction to a first-principles prediction.","example":"Adding a small learned correction to a first-principles temperature model where a stable residual bias remains.","layer":"edge","deterministic_alternative":"Recalibrated physics model or explicit empirical correction","justified_when":"Residual structure is stable and improves held-out performance without violating constraints.","poor_fit_when":"The base model is structurally wrong or residual data lack envelope coverage.","data_requirement":"Validated base model and representative residuals across regimes.","max_authority":2,"authority_basis":"Advisory ceiling; the learned closure can invalidate physical guarantees.","validation_required":"Ablation, conservation, regime holdout, uncertainty, drift, and base-model fallback.","failure_modes":"Physics cancellation, extrapolated correction, regime shift, and hidden bias.","safety_independence":"Independent limits use the uncorrected conservative model or direct measurements.","evidence_strength":"mixed","maturity":"piloted","sources":["nist_ai_rmf","pinn_failure"]},
    {"id":"reinforcement_learning_policy","method":"Reinforcement-learning policy","family":"optimisation","does":"Selects actions to maximise a learned or simulated cumulative reward.","example":"Learning a start-up sequence in a high-fidelity simulator, run only behind an independent action envelope.","layer":"supervisory","deterministic_alternative":"MPC, dynamic programming, rules, or operator procedure","justified_when":"A high-fidelity environment and independent action envelope show value over deterministic control.","poor_fit_when":"Unsafe exploration, reward misspecification, or unmodelled rare events cannot be ruled out.","data_requirement":"Validated simulator or extensive trajectories including disturbances and boundary cases.","max_authority":3,"authority_basis":"Default operator-approved ceiling; level 4 needs an independently verified veto architecture.","validation_required":"Adversarial scenarios, reward audit, policy stability, shift, constraint, and rollback tests.","failure_modes":"Reward hacking, unsafe exploration, simulator gap, brittle policy, and action chattering.","safety_independence":"A non-learned envelope vetoes every unsafe or out-of-scope action.","evidence_strength":"engineering judgement","maturity":"research","sources":["iec_tr_5469","nist_ai_rmf"]},
    {"id":"online_adaptive_learning","method":"Online adaptive learning","family":"estimation","does":"Updates model parameters from live operating data.","example":"Continuously retuning a model from live data — kept offline here until update bounds and rollback are fully controlled.","layer":"edge","deterministic_alternative":"Scheduled fixed models with reviewed offline updates","justified_when":"Update bounds, acceptance tests, rollback, and drift causes are fully controlled.","poor_fit_when":"The context is certified, safety-related, adversarial, or labels arrive late.","data_requirement":"Live data, trustworthy feedback, bounded update rules, and retained baseline data.","max_authority":0,"authority_basis":"Phase 49a recommends offline-only treatment in certified or safety-relevant contexts.","validation_required":"Shadow mode, update bounds, poisoning, rollback, reproducibility, and change-control tests.","failure_modes":"Catastrophic forgetting, poisoning, feedback loop, silent drift, and unreproducible state.","safety_independence":"Live learning is isolated from safety and direct control paths.","evidence_strength":"standards body","maturity":"research","sources":["iec_tr_5469","eu_machinery","eu_ai_act"]},
    {"id":"llm_engineering_copilot","method":"LLM engineering copilot","family":"language/agentic","does":"Drafts explanations, analyses, or engineering artefacts from supplied context.","example":"Drafting a functional-description document from supplied P&ID notes for an engineer to review and correct.","layer":"engineering workstation","deterministic_alternative":"Templates, search, rules, and human engineering review","justified_when":"Drafting speed helps and every material claim and output can be reviewed.","poor_fit_when":"Source provenance is absent or the output can directly alter a plant.","data_requirement":"Approved context, retrieval boundary, prompts, and representative evaluation tasks.","max_authority":2,"authority_basis":"Advisory ceiling; fluent text is not verified engineering evidence.","validation_required":"Grounding, citation, prompt-injection, confidentiality, repeatability, and expert-review tests.","failure_modes":"Hallucination, source confusion, prompt injection, sensitive-data disclosure, and automation bias.","safety_independence":"No generated output bypasses engineering review or safety lifecycle controls.","evidence_strength":"mixed","maturity":"piloted","sources":["nist_ai_rmf","nist_genai_profile","nist_sp80082"]},
    {"id":"llm_plc_code_draft","method":"LLM PLC code drafting","family":"language/agentic","does":"Produces candidate PLC code or tests from a natural-language requirement.","example":"Drafting a first-pass interlock routine offline that an engineer rewrites and formally checks before any controller sees it.","layer":"engineering workstation","deterministic_alternative":"Reviewed templates, libraries, and manual implementation","justified_when":"Generated code remains a draft and formal/static/dynamic checks are effective.","poor_fit_when":"Requirements are ambiguous or code could reach production without independent verification.","data_requirement":"Approved examples, language grammar, requirements, and adversarial test tasks.","max_authority":0,"authority_basis":"Offline drafting only; the cited PLC work is a peer-reviewed proof of concept (ICSE 2024 SEIP) and does not establish deployment safety.","validation_required":"Compile, static analysis, simulation, traceability, mutation, security, and human review.","failure_modes":"Invented API, unsafe state path, incomplete requirement, plausible wrong code, and hidden prompt dependency.","safety_independence":"Safety application code follows its required lifecycle and independent verification.","evidence_strength":"peer-reviewed","maturity":"research","sources":["llm4plc","iec_tr_5469"]},
    {"id":"agentic_engineering_workflow","method":"Agentic engineering workflow","family":"language/agentic","does":"Plans and invokes tools across a multi-step engineering task.","example":"Planning and running a multi-step documentation task with narrow, reversible tool permissions and gated steps.","layer":"engineering workstation","deterministic_alternative":"Scripted workflow with explicit approvals and checks","justified_when":"Tool permissions are narrow, actions are reversible, and each consequential step is gated.","poor_fit_when":"The agent can change live controls, safety settings, credentials, or unreviewed records.","data_requirement":"Tool schemas, policy tests, representative tasks, and attack scenarios.","max_authority":0,"authority_basis":"Offline engineering use only; no evidence supports autonomous plant authority.","validation_required":"Permission, injection, tool-error, rollback, audit-log, and human-approval tests.","failure_modes":"Goal drift, unsafe tool choice, injection, cascading error, and false completion claim.","safety_independence":"Agent credentials and network paths cannot reach safety or production control authority.","evidence_strength":"standards body","maturity":"research","sources":["nist_ai_rmf","nist_sp80082"]},
    {"id":"edge_inference","method":"Edge inference deployment","family":"interface","does":"Runs a validated model near high-rate sensors and publishes a lower-rate result.","example":"Running a validated vibration model on a gateway beside the sensor and publishing only the health verdict upstream.","layer":"edge","deterministic_alternative":"Stream raw data to a central analytic service","justified_when":"Bandwidth, latency, privacy, or acquisition rate makes local processing necessary.","poor_fit_when":"Edge lifecycle, timing, security, and model update controls cannot be maintained.","data_requirement":"Representative signals plus hardware timing, load, and failure tests.","max_authority":2,"authority_basis":"NIST OT guidance supports local/segmented placement; it does not grant model authority.","validation_required":"Worst-case latency, resource exhaustion, reboot, version, integrity, and stale-output tests.","failure_modes":"Late result, resource starvation, silent model mismatch, and disconnected drift.","safety_independence":"Edge failure leaves the plant in a protected, diagnosable state.","evidence_strength":"standards body","maturity":"industrially routine","sources":["nist_sp80082","nist_ai_rmf"]},
    {"id":"opcua_ai_result_publication","method":"OPC UA result publication","family":"interface","does":"Publishes model result, confidence, version, quality, and freshness as custom structured data.","example":"Publishing a diagnosis with its confidence, model version, quality, and freshness as a structured OPC UA object.","layer":"supervisory","deterministic_alternative":"Vendor-neutral tags plus documented alarm/event mapping","justified_when":"Consumers need discoverable semantics, security roles, and quality metadata.","poor_fit_when":"A polling path is incorrectly expected to reconstruct high-rate source waveforms.","data_requirement":"Information model, units, timestamps, quality, version, and stale-state contract.","max_authority":2,"authority_basis":"OPC UA transports application-defined results; it has no standard AI-result meaning or authority grant.","validation_required":"Schema, timestamp, quality, stale, role, reconnect, and consumer-compatibility tests.","failure_modes":"Stale good-looking value, semantic mismatch, timestamp loss, and unauthorized write.","safety_independence":"Publication failure or corruption cannot defeat independent protection.","evidence_strength":"standards body","maturity":"industrially routine","sources":["opcua_part1","opcua_part9","opcua_part18"]},
    {"id":"sparkplug_ai_result_publication","method":"MQTT Sparkplug result publication","family":"interface","does":"Publishes state-aware metrics for model results over MQTT infrastructure.","example":"Publishing model results as state-aware Sparkplug metrics over MQTT for store-and-forward integration.","layer":"supervisory","deterministic_alternative":"OPC UA or a documented application-specific message contract","justified_when":"Store-and-forward or brokered integration benefits from Sparkplug state semantics.","poor_fit_when":"Teams assume Sparkplug standardises AI field meanings or ignore broker/security design.","data_requirement":"Metric contract including units, timestamp, model version, quality, confidence, and freshness.","max_authority":2,"authority_basis":"Sparkplug defines transport/state behaviour, not standard AI-result semantics or control authority.","validation_required":"Birth/death, stale, reconnect, duplicate, ordering, authorization, and schema tests.","failure_modes":"Retained stale result, semantic collision, broker outage, replay, and metric drift.","safety_independence":"Brokered results do not implement safety functions.","evidence_strength":"standards body","maturity":"industrially routine","sources":["sparkplug","nist_sp80082"]},
    {"id":"historian_feature_pipeline","method":"Historian feature pipeline","family":"interface","does":"Builds time-aligned, versioned analytic features from retained OT data.","example":"Building versioned, time-aligned features from historian data so an analysis can be reproduced months later.","layer":"historian/analytics","deterministic_alternative":"Direct trend review or explicitly computed reports","justified_when":"Repeatable analytics require traceable transforms across long history.","poor_fit_when":"Sampling, timestamps, modes, and data quality cannot support the target claim.","data_requirement":"Governed tags, clocks, units, quality flags, modes, lineage, and retention.","max_authority":2,"authority_basis":"Read-only/advisory analytics placement is consistent with segmented OT architecture.","validation_required":"Time alignment, leakage, unit, replay, lineage, access, and backfill tests.","failure_modes":"Future leakage, resampling artefact, unit drift, bad-quality inclusion, and lineage loss.","safety_independence":"Historian analytics remain outside safety and real-time control paths.","evidence_strength":"standards body","maturity":"industrially routine","sources":["nist_sp80082","nist_ai_rmf"]},
    {"id":"digital_twin_state_sync","method":"Digital-twin state synchronisation","family":"interface","does":"Aligns model state, plant observations, version, and freshness for comparison or forecasting.","example":"Keeping a simulation aligned with plant observations, with version and freshness, to forecast a defined scenario.","layer":"supervisory","deterministic_alternative":"SCADA mimic, simulator snapshot, or engineering calculation","justified_when":"A defined use case needs stateful prediction and every variable has a semantic contract.","poor_fit_when":"The twin has no owner, calibration path, or stale-state behaviour.","data_requirement":"Asset identity, topology, state mapping, time sync, parameters, events, and version lineage.","max_authority":2,"authority_basis":"Advisory ceiling until each composing model has a stronger verified authority case; ISO 23247 frames the twin but confers no safety authority.","validation_required":"State reconciliation, version mismatch, stale data, topology change, and fallback tests.","failure_modes":"Twin drift, identity mismatch, stale state, wrong topology, and false fidelity.","safety_independence":"The twin cannot override independent interlocks or protection.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["nist_ai_rmf","nist_sp80082","iso_23247"]},
    {"id":"mass_energy_balance","method":"Mass and energy balance","family":"chemical-kinetic","does":"Constrains flows, inventories, compositions, and heat by conservation.","example":"Reconciling metered flows and inventories around a unit by conservation to catch a measurement error.","layer":"edge","deterministic_alternative":"Direct inventory and flow reconciliation","justified_when":"Boundaries, phases, sources, and measurements are defined.","poor_fit_when":"Unmeasured flows, phase change, or accumulation terms are omitted.","data_requirement":"Topology, properties, flow/composition/temperature measurements, and boundary conditions.","max_authority":"Planned","authority_basis":"Governing-model structure is credible, but Phase 49a did not close domain authority evidence.","validation_required":"Closure residuals, units, transients, sensor faults, and independent inventory checks.","failure_modes":"Wrong boundary, missing species, property error, and compensating sensor biases.","safety_independence":"Protective limits use independently justified measurements and design bases.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["phase49a"]},
    {"id":"arrhenius_kinetics","method":"Arrhenius reaction-kinetics model","family":"chemical-kinetic","does":"Relates reaction-rate constants to temperature within a fitted mechanism.","example":"Relating a reaction rate to temperature within a fitted mechanism over its validated parameter range.","layer":"edge","deterministic_alternative":"Validated empirical rate table or conservative design case","justified_when":"Mechanism, parameter range, and transport assumptions match the process.","poor_fit_when":"Mass transfer, catalyst ageing, side reactions, or thermal runaway dominate outside calibration.","data_requirement":"Rate measurements across temperature, composition, pressure, and relevant catalyst state.","max_authority":"Planned","authority_basis":"NIST supports kinetics data access; application authority remains an open Phase 49a gap.","validation_required":"Independent experiments, parameter uncertainty, extrapolation, heat-release, and sensitivity tests.","failure_modes":"Exponential extrapolation, wrong mechanism, transport limitation, and parameter compensation.","safety_independence":"Runaway protection is based on independent hazard analysis and protective systems.","evidence_strength":"mixed","maturity":"industrially routine","sources":["nist_kinetics","phase49a"]},
    {"id":"equilibrium_thermodynamics","method":"Equilibrium thermodynamic model","family":"chemical-kinetic","does":"Computes phase or reaction equilibrium from thermodynamic relationships.","example":"Computing vapour-liquid equilibrium for a separation where the property method covers the composition range.","layer":"engineering workstation","deterministic_alternative":"Validated property package, laboratory data, or conservative bounding calculation","justified_when":"Equilibrium is a valid approximation and the property method covers the composition range.","poor_fit_when":"Kinetics, metastability, transport, or missing species control behaviour.","data_requirement":"Species, phases, property parameters, composition, pressure, and temperature range.","max_authority":"Planned","authority_basis":"Phase 49a left the primary-source evidence gap open; no authority claim is made.","validation_required":"Property comparison, phase-boundary cases, closure, sensitivity, and laboratory checks.","failure_modes":"Wrong property method, missing phase, false equilibrium assumption, and extrapolation.","safety_independence":"Independent relief, trip, and containment design remains authoritative.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["phase49a"]},
    {"id":"transport_pde_model","method":"Transport PDE model","family":"chemical-kinetic","does":"Models spatial diffusion, convection, heat transfer, or species transport.","example":"Modelling species diffusion across a packed bed where spatial gradients drive the design decision.","layer":"engineering workstation","deterministic_alternative":"Lumped model, empirical correlation, or validated numerical package","justified_when":"Spatial gradients affect the decision and boundary conditions are defensible.","poor_fit_when":"Closures or boundaries dominate uncertainty beyond useful resolution.","data_requirement":"Geometry, material properties, constitutive closures, boundaries, and validation measurements.","max_authority":"Planned","authority_basis":"Useful governing structure; current domain evidence does not establish operational authority.","validation_required":"Grid/time convergence, conservation, benchmark, sensitivity, and transient validation.","failure_modes":"Mesh dependence, closure error, wrong boundary, numerical diffusion, and unstable solve.","safety_independence":"Safety margins and protection do not rely on a single unverified simulation.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["phase49a"]},
    {"id":"hybrid_chemical_closure","method":"Learned chemical closure model","family":"physics-informed","does":"Approximates an unresolved reaction, property, or transport closure inside a physical model.","example":"Approximating an unresolved reaction closure inside a physical model, bounded and validated across every intended regime.","layer":"edge","deterministic_alternative":"Mechanistic closure, tabulation, or conservative correlation","justified_when":"The learned closure is bounded, faster, and validated across every intended regime.","poor_fit_when":"Rare regimes, conservation, positivity, or extrapolation cannot be controlled.","data_requirement":"High-quality simulation or experiment data spanning regime and uncertainty.","max_authority":"Planned","authority_basis":"Phase 49a supports a hybrid research pattern but not an operational authority claim.","validation_required":"Conservation, positivity, regime holdout, uncertainty, drift, and deterministic fallback.","failure_modes":"Nonphysical closure, unstable coupling, distribution shift, and hidden compensation.","safety_independence":"Independent protection assumes the learned closure can be completely wrong.","evidence_strength":"preprint","maturity":"research","sources":["pinn_failure","phase49a"]},
    {"id":"monod_growth_model","method":"Monod-type growth model","family":"biological","does":"Relates microbial growth rate to a limiting substrate under fitted assumptions.","example":"Relating microbial growth rate to a limiting substrate for a fermentation matching the fitted assumptions.","layer":"engineering workstation","deterministic_alternative":"Empirical batch profile or mass-balance trend","justified_when":"Organism, substrate limitation, inhibition, and operating mode match the fitted model.","poor_fit_when":"Mixed populations, inhibition, morphology, or unmeasured limitations dominate.","data_requirement":"Biomass, substrate, product, feed, and environment measurements across batches.","max_authority":"Planned","authority_basis":"Phase 49a supports model structure only; no authority evidence was established.","validation_required":"Batch holdout, parameter identifiability, inhibition, contamination, and uncertainty tests.","failure_modes":"Wrong limiting factor, population shift, non-identifiability, and batch-to-batch drift.","safety_independence":"Containment, sterilisation, and critical limits remain independently protected.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["phase49a"]},
    {"id":"fed_batch_feed_profile","method":"Fed-batch feed profile","family":"biological","does":"Schedules substrate addition using time, measurements, or a fitted growth model.","example":"Scheduling substrate addition over a fed-batch run from time and measurements against a validated trajectory.","layer":"device","deterministic_alternative":"Open-loop recipe with PI/PID trim","justified_when":"The process and assay evidence support a repeatable feed trajectory.","poor_fit_when":"Culture state is poorly observed or batch variability invalidates the profile.","data_requirement":"Batch trajectories, feed records, assays, oxygen, pH, and product outcomes.","max_authority":"Planned","authority_basis":"Open-loop profiles and PI/PID are reality baselines; advanced authority remains unverified.","validation_required":"Batch holdout, missed-feed, sensor fault, contamination, saturation, and fallback tests.","failure_modes":"Overfeed, oxygen limitation, inhibition, wrong batch phase, and actuator error.","safety_independence":"Independent limits protect pressure, temperature, gas, and containment.","evidence_strength":"engineering judgement","maturity":"industrially routine","sources":["phase49a","cst_control"]},
    {"id":"raman_pls_soft_sensor","method":"Raman-plus-PLS bioprocess soft sensor","family":"biological","does":"Estimates concentration or quality attributes from calibrated spectra.","example":"Estimating product concentration between assays from calibrated Raman spectra spanning lots and probes.","layer":"edge","deterministic_alternative":"Offline assay, direct sensor, or simpler spectral calibration","justified_when":"Reference assays and spectra cover lots, instruments, probes, and process phases.","poor_fit_when":"Calibration transfer, fluorescence, fouling, or sparse reference assays dominate.","data_requirement":"Time-aligned spectra and trusted assays across batches, probes, and maintenance states.","max_authority":"Planned","authority_basis":"Phase 49a supports the soft-sensor pattern but not a general operational authority ceiling.","validation_required":"Batch/lot holdout, calibration transfer, probe-fault, uncertainty, drift, and assay reconciliation.","failure_modes":"Spectral drift, fouling, batch confounding, calibration transfer error, and false confidence.","safety_independence":"Critical quality and safety decisions retain required independent confirmation.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["phase49a","nist_ai_rmf"]},
    {"id":"metabolic_flux_balance","method":"Metabolic flux-balance model","family":"biological","does":"Computes feasible metabolic fluxes under stoichiometric and objective assumptions.","example":"Computing feasible metabolic fluxes under stoichiometric constraints for a credible organism and condition.","layer":"engineering workstation","deterministic_alternative":"Yield coefficients, mass balance, or empirical pathway analysis","justified_when":"Network, constraints, and objective are credible for the organism and condition.","poor_fit_when":"Regulation, kinetics, mixed populations, or objective ambiguity dominate.","data_requirement":"Stoichiometry, uptake/secretion bounds, biomass objective, and validation assays.","max_authority":"Planned","authority_basis":"Engineering structure only; Phase 49a did not establish control-authority evidence.","validation_required":"Flux consistency, alternative objectives, knockout/perturbation, uncertainty, and assay checks.","failure_modes":"Wrong objective, missing pathway, unconstrained alternate optimum, and condition mismatch.","safety_independence":"The model cannot set safety-critical feeds or containment limits.","evidence_strength":"engineering judgement","maturity":"piloted","sources":["phase49a"]},
    {"id":"advanced_bioprocess_control","method":"Advanced bioprocess supervisory control","family":"biological","does":"Coordinates feeds, gases, temperature, or harvest timing from models and soft sensors.","example":"Coordinating feed, gas, and temperature from models and soft sensors where it beats the classical baseline across batches.","layer":"supervisory","deterministic_alternative":"Recipe, cascade PI/PID, ratio, and operator procedure","justified_when":"It beats the classical baseline across batches with bounded, reviewable actions.","poor_fit_when":"Culture state, contamination, assay delay, or batch variability cannot be bounded.","data_requirement":"Representative batches, interventions, assays, disturbances, and actuator constraints.","max_authority":"Planned","authority_basis":"Phase 49a found research/pilot evidence but no basis for a general authority claim.","validation_required":"Batch holdout, adversarial disturbance, soft-sensor fault, constraint, rollback, and quality tests.","failure_modes":"Wrong biological state, delayed assay, model drift, overfeed, and objective conflict.","safety_independence":"Basic control, containment, sterilisation, trips, and operator stop remain independent.","evidence_strength":"engineering judgement","maturity":"research","sources":["phase49a","nist_ai_rmf"]}
  ]
