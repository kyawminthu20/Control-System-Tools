# PLC & IPC hardware families — Siemens / Rockwell (Allen-Bradley) / Beckhoff.
# Source: control-standards/work/general/plc_ipc_hardware_intake_2026-07.md
# (Phase 48 intake; utm_source params stripped on relocation).
# All values are vendor-published product positioning, paraphrased in original
# wording — no vendor text or tables are reproduced.
#
# LIFECYCLE WARNING: every `status` value is a lifecycle/market claim valid
# only as of the entry's `as_of` date. Re-verify ALL status values against the
# vendor lifecycle / product pages before relying on them. Family-level only —
# no per-CPU data; the vendor ordering documentation is authoritative.

siemens:
  - family: "LOGO!"
    class: "Logic module"
    form: "Compact DIN-rail logic module"
    io_system: "Onboard I/O plus expansion modules"
    typical_use: "Small pumps, lighting, building services, simple standalone equipment"
    status: "Current"
    as_of: "July 2026"
    notes: "Programmed in its own tool (LOGO! Soft Comfort), not TIA Portal."

  - family: "S7-1200 / S7-1200 G2"
    class: "PLC"
    form: "Compact DIN-rail PLC"
    io_system: "Onboard I/O, signal boards and expansion modules; PROFINET to distributed I/O"
    typical_use: "Small standalone and networked machines"
    status: "Current; G2 is the newer generation"
    as_of: "July 2026"
    notes: "The G2 generation extends the original line's communication, motion, and safety options."

  - family: "S7-1500"
    class: "PLC"
    form: "Modular cabinet-mounted PLC"
    io_system: "Local rack modules; ET 200 distributed I/O over PROFINET"
    typical_use: "Medium to large machines, production lines, process skids"
    status: "Current"
    as_of: "July 2026"
    notes: "Variant suffixes: F (fail-safe), T (technology/motion), TF (both), R/H (redundant high-availability pair)."

  - family: "S7-1500 F / TF"
    class: "Safety PLC"
    form: "Fail-safe variants of the S7-1500 line"
    io_system: "Fail-safe ET 200 / rack modules alongside standard I/O"
    typical_use: "Standard and safety control in one CPU; TF adds motion technology functions"
    status: "Current"
    as_of: "July 2026"
    notes: "Engineered with the safety option of the same tool chain; certification evidence per project."

  - family: "ET 200SP CPU"
    class: "PLC"
    form: "CPU built into a distributed I/O station"
    io_system: "ET 200SP I/O modules on the same mounting rail"
    typical_use: "Distributed machine control, tight cabinet space"
    status: "Current"
    as_of: "July 2026"
    notes: "Places processing at the I/O station instead of a central cabinet."

  - family: "ET 200pro CPU"
    class: "PLC"
    form: "IP65/67 machine-mounted controller"
    io_system: "ET 200pro modules, cabinet-free"
    typical_use: "Conveyors and decentralized control without an enclosure"
    status: "Current"
    as_of: "July 2026"
    notes: "High-protection-rating packaging for direct machine mounting."

  - family: "ET 200SP Open Controller"
    class: "Software controller"
    form: "PC-based controller with local ET 200SP I/O in one device"
    io_system: "ET 200SP I/O on the same rail"
    typical_use: "PLC, Windows application, and visualization combined in one unit"
    status: "Current"
    as_of: "July 2026"
    notes: "Software-controller runtime plus a Windows environment in a distributed-I/O form factor."

  - family: "SIMATIC Drive Controller"
    class: "PLC"
    form: "S7-1500 TF CPU with integrated drive control"
    io_system: "PROFINET / ET 200 plus integrated drive interfaces"
    typical_use: "Servo-intensive, coordinated-motion machinery"
    status: "Current"
    as_of: "July 2026"
    notes: "Combines a fail-safe technology CPU with drive-control functions in one housing."

  - family: "S7-1500S (Software Controller)"
    class: "Software controller"
    form: "Real-time software PLC installed on a SIMATIC IPC"
    io_system: "PROFINET / ET 200 distributed I/O"
    typical_use: "Real-time control beside Windows or high-level applications on one industrial PC"
    status: "Current"
    as_of: "July 2026"
    notes: "Vendor documentation describes control continuing through an operating-system restart or failure — verify the isolation model for your version."

  - family: "S7-1500V (Virtual Controller)"
    class: "Software controller"
    form: "Virtual PLC deployed through the vendor's edge/management platform"
    io_system: "PROFINET / ET 200 via the virtualization host's networking"
    typical_use: "Centrally managed, software-defined control"
    status: "Current"
    as_of: "July 2026"
    notes: "Hardware-independent deployment; lifecycle managed centrally rather than per device."

  - family: "S7-300 / S7-400 / ET 200S CPU / WinAC"
    class: "PLC"
    form: "Previous-generation modular PLCs and PC-based control"
    io_system: "Classic ET 200 / rack I/O generations"
    typical_use: "Large installed base in machines and process plants"
    status: "Older generations — vendor migration guidance points to S7-1500-era platforms; published availability windows apply"
    as_of: "July 2026"
    notes: "The vendor has published availability of the S7-300-era hardware into the early 2030s — verify current dates against the vendor lifecycle pages."

  - family: "SIMATIC Box PC"
    class: "Box IPC"
    form: "Cabinet- or machine-mounted PC without integrated display"
    io_system: "No native control I/O — pairs with a software controller or fieldbus interfaces"
    typical_use: "Gateways, HMI runtime, vision, data logging; host for S7-1500S"
    status: "Current"
    as_of: "July 2026"
    notes: "Spans an IoT-gateway class through expandable high-performance units (GPU-capable at the top)."

  - family: "SIMATIC Panel PC"
    class: "Panel IPC"
    form: "Computer and display combined in one device"
    io_system: "No native control I/O — pairs with a software controller or networks"
    typical_use: "Operator stations with local compute; HMI plus applications"
    status: "Current"
    as_of: "July 2026"
    notes: "Panel-mounted and selected fully protected configurations published."

  - family: "SIMATIC Rack PC"
    class: "Rack IPC"
    form: "19-inch rack systems in client, workstation, and server classes"
    io_system: "No native control I/O — server/network infrastructure role"
    typical_use: "SCADA clients, engineering stations, simulation, virtualization hosts"
    status: "Current"
    as_of: "July 2026"
    notes: "Vendor splits the range into client, workstation, and server classes."

allen_bradley:
  - family: "Micro800 (Micro810 / 820 / 850 / 870)"
    class: "PLC"
    form: "Micro PLC family, DIN-rail"
    io_system: "Onboard I/O plus plug-ins and expansion modules"
    typical_use: "Relay replacement up to small machines, skids, and remote equipment"
    status: "Current; Micro830 catalog numbers identified by the vendor as discontinued"
    as_of: "July 2026"
    notes: "Programmed in Connected Components Workbench / FactoryTalk Design Workbench — not the Studio 5000 Logix project format, so not simply a smaller Logix controller."

  - family: "CompactLogix 5380"
    class: "PLC"
    form: "Compact DIN-rail Logix controller"
    io_system: "Compact 5000 I/O locally; EtherNet/IP to distributed I/O"
    typical_use: "Machine and skid control; motion and networking per controller model"
    status: "Current"
    as_of: "July 2026"
    notes: "Process-focused variants published for process-library-oriented use."

  - family: "Compact GuardLogix 5380"
    class: "Safety PLC"
    form: "Safety variant of CompactLogix 5380"
    io_system: "Compact 5000 (incl. safety I/O); EtherNet/IP safety"
    typical_use: "Integrated standard and machine-safety control"
    status: "Current"
    as_of: "July 2026"
    notes: "Published in SIL 2 and SIL 3 integrity classes — certification documents govern the claim."

  - family: "CompactLogix 5480"
    class: "Hybrid PLC / IPC"
    form: "Logix real-time control engine plus a parallel Windows environment in one unit"
    io_system: "Compact 5000 I/O; EtherNet/IP"
    typical_use: "Machine control with co-located HMI, analytics, or custom applications"
    status: "Current"
    as_of: "July 2026"
    notes: "Vendor documentation describes the Windows side running independently of the Logix control engine."

  - family: "CompactLogix 5390"
    class: "PLC"
    form: "Next compact-controller generation, reduced footprint"
    io_system: "Local PointMax I/O per vendor announcement"
    typical_use: "Higher-performance compact machine control"
    status: "Announced — vendor-published availability stated for Q4 2026; not a generally shipping replacement for 5380 yet"
    as_of: "July 2026"
    notes: "Verify shipping status and I/O availability before specifying."

  - family: "ControlLogix 5580"
    class: "PLC"
    form: "Chassis-based modular controller"
    io_system: "1756 chassis I/O; EtherNet/IP to distributed I/O (e.g. POINT I/O)"
    typical_use: "Large machine, plant, process, and motion control"
    status: "Current — remains an active platform after the 5590 introduction"
    as_of: "July 2026"
    notes: "Process, redundant, extreme-environment, conformally coated, and no-stored-energy variants published."

  - family: "GuardLogix 5580"
    class: "Safety PLC"
    form: "Safety variant of ControlLogix 5580"
    io_system: "1756 chassis and networked safety I/O"
    typical_use: "Standard plus integrated safety at plant scale"
    status: "Current"
    as_of: "July 2026"
    notes: "Certification documents govern the integrity claim per configuration."

  - family: "ControlLogix 5590"
    class: "PLC"
    form: "Newest chassis-based generation"
    io_system: "Chassis architecture combining controllers, network modules, and I/O interfaces"
    typical_use: "Discrete, motion, process, and multidiscipline control"
    status: "Current — newest chassis generation"
    as_of: "July 2026"
    notes: "Vendor states it is configurable for standard, safety, redundant, and safety-instrumented-system applications."

  - family: "Older / legacy Logix and predecessors (ControlLogix 5570, CompactLogix 5370 / 1768 / 1769, SLC 500, PLC-5, MicroLogix)"
    class: "PLC"
    form: "Previous-generation compact and chassis controllers"
    io_system: "Generation-specific (1769, 1746, 1771, etc.)"
    typical_use: "Installed base; migration planning"
    status: "Older / legacy — some catalog numbers discontinued; vendor migration guidance generally targets 5380/5580-era platforms"
    as_of: "July 2026"
    notes: "Check each catalog number's lifecycle state individually — the families migrated at different times."

  - family: "ASEM 6300B"
    class: "Box IPC"
    form: "Box PCs from entry to performance class"
    io_system: "No native control I/O — computing platform"
    typical_use: "HMI, gateways, data logging, general industrial computing"
    status: "Current"
    as_of: "July 2026"
    notes: "Subfamilies span compact, book-mount, wall-mount, and performance classes with ECC options at the top."

  - family: "ASEM 6300P / 6300PA"
    class: "Panel IPC"
    form: "Panel PCs; 6300PA is the on-machine IP-rated variant"
    io_system: "No native control I/O — computing platform"
    typical_use: "Operator stations with local compute; on-machine HMI"
    status: "Current"
    as_of: "July 2026"
    notes: "Positioned around the vendor's visualization and thin-client software stack."

  - family: "6300T / 6300M / 6300MA"
    class: "Thin client / monitor"
    form: "Box thin client; panel- and machine-mounted monitors"
    io_system: "None — display/terminal role"
    typical_use: "Centrally managed visualization endpoints"
    status: "Current"
    as_of: "July 2026"
    notes: "6300T is a managed terminal, not a local HMI server; 6300M/6300MA are monitors, not computers."

  - family: "6181X"
    class: "Hazardous-location IPC"
    form: "Display and non-display PCs certified for hazardous locations"
    io_system: "No native control I/O"
    typical_use: "Computing and visualization in classified areas"
    status: "Current"
    as_of: "July 2026"
    notes: "Certification scope per model — verify area classification against the certificate."

  - family: "VersaVirtual"
    class: "Rack IPC / virtualization appliance"
    form: "Preconfigured industrial virtualization appliance"
    io_system: "None — infrastructure role"
    typical_use: "Consolidating multiple industrial software workloads onto managed compute, network, and storage"
    status: "Current"
    as_of: "July 2026"
    notes: "An infrastructure product, not a PLC."

beckhoff:
  - family: "TwinCAT 3 runtime (XAR)"
    class: "Software controller"
    form: "Real-time runtime installed on supported Beckhoff PC hardware (or supported virtualized architectures)"
    io_system: "EtherCAT (typical), plus other supported fieldbuses"
    typical_use: "PLC, motion, CNC, robotics, safety communication on one platform"
    status: "Current"
    as_of: "July 2026"
    notes: "In this ecosystem the runtime — not the box — is the controller; the hardware families below are the platforms it runs on."

  - family: "BC / BX Bus Terminal Controllers"
    class: "PLC"
    form: "Bus coupler with integrated control runtime"
    io_system: "Bus Terminals attached locally"
    typical_use: "Small decentralized fieldbus controllers or intelligent fieldbus devices"
    status: "Established, installed-base oriented — new TwinCAT 3 projects more commonly specify CX hardware"
    as_of: "July 2026"
    notes: "BX offers more memory and interfaces than BC; both sit below the CX class."

  - family: "CX7000"
    class: "Embedded PC"
    form: "Compact DIN-rail embedded PC, Arm-based entry class"
    io_system: "EtherCAT / Bus Terminals attach directly to the controller"
    typical_use: "Small machines and local automation at low cost"
    status: "Current"
    as_of: "July 2026"
    notes: "Entry point into TwinCAT 3 on dedicated hardware."

  - family: "CX8100 / CX8200"
    class: "Embedded PC"
    form: "Compact fieldbus-oriented embedded PCs"
    io_system: "EtherCAT / Bus Terminals locally; fieldbus interface per model"
    typical_use: "Distributed machine, building, and utility control"
    status: "Current; CX8200 is the newer Arm generation (CX8000 is the older generation)"
    as_of: "July 2026"
    notes: "Chosen where a compact controller doubles as a fieldbus node."

  - family: "CX9020 / CX9240"
    class: "Embedded PC"
    form: "Compact Arm-based embedded PCs"
    io_system: "EtherCAT / Bus Terminals attach directly"
    typical_use: "General machine control"
    status: "Current; CX9240 is the newer generation"
    as_of: "July 2026"
    notes: "The general-purpose compact class between CX7000/CX8xxx and the x86 ranges."

  - family: "CX51xx – CX56xx"
    class: "Embedded PC"
    form: "Midrange x86 embedded PCs, fanless / modular"
    io_system: "EtherCAT terminals attach directly; expansion modules per series"
    typical_use: "PLC plus HMI and moderate motion; data-heavier machines at the top of the range"
    status: "Current"
    as_of: "July 2026"
    notes: "Performance steps up through the series numbers; defer processor specifics to the vendor datasheets."

  - family: "CX20xx (CX20x2 / CX20x3)"
    class: "Embedded PC"
    form: "High-performance modular embedded PCs, up to server-class processors"
    io_system: "EtherCAT terminals attach directly; modular interface options"
    typical_use: "Large PLC systems, multi-axis motion, CNC, visualization, multi-runtime control"
    status: "Current — top of the DIN-rail embedded-controller range"
    as_of: "July 2026"
    notes: "Where requirements exceed this class, the C-series box IPCs continue the range."

  - family: "C60xx"
    class: "Box IPC"
    form: "Ultra-compact cabinet PCs"
    io_system: "EtherCAT via network ports; no rail-attached terminals"
    typical_use: "PLC, motion, vision, IoT, and machine control as a compact box"
    status: "Current"
    as_of: "July 2026"
    notes: "Internal performance groups step from entry/IoT class up to GPU-capable units (C601x–C604x)."

  - family: "C65xx / C69xx"
    class: "Box IPC"
    form: "Fanless built-in and compact cabinet PCs"
    io_system: "EtherCAT via network ports"
    typical_use: "Behind-panel installation; general scalable machine control"
    status: "Current"
    as_of: "July 2026"
    notes: "Form-factor variants of the same PC-based control role."

  - family: "C70xx"
    class: "Box IPC"
    form: "Ultra-compact IP65 machine-mounted PC"
    io_system: "EtherCAT via network ports, cabinet-free"
    typical_use: "Local computing directly on the machine without an enclosure"
    status: "Current"
    as_of: "July 2026"
    notes: "The cabinet-free counterpart to the C60xx class."

  - family: "C66xx"
    class: "Box IPC"
    form: "ATX-based expandable cabinet PC"
    io_system: "EtherCAT via network ports; PCI/PCIe expansion slots"
    typical_use: "Vision, specialized plug-in hardware, expandable control PCs"
    status: "Current"
    as_of: "July 2026"
    notes: "Chosen when card slots are the requirement."

  - family: "C5xxx / C6670"
    class: "Rack IPC"
    form: "19-inch rack PCs and an industrial server"
    io_system: "Network infrastructure role"
    typical_use: "Plant engineering, SCADA, high-compute and virtualization workloads"
    status: "Current"
    as_of: "July 2026"
    notes: "The server end of the PC-based control range."

  - family: "CP2xxx – CP7xxx / CPX"
    class: "Panel IPC"
    form: "Built-in and IP65 machine-mounted panel PCs; multi-touch and single-touch generations"
    io_system: "EtherCAT via network ports"
    typical_use: "Operator stations that can also run the control runtime"
    status: "Current; CP4xxx/CP5xxx are the newer multi-touch generation, CP6xxx/CP7xxx the established single-touch lines"
    as_of: "July 2026"
    notes: "CPX27xx/CPX37xx are the hazardous-area (Zone 2/22) variants — verify certification scope per model."

  - family: "TwinSAFE"
    class: "Safety PLC"
    form: "Safety logic and safety I/O terminals within the EtherCAT terminal system"
    io_system: "EtherCAT (Safety over EtherCAT)"
    typical_use: "Integrated machine safety alongside any TwinCAT controller"
    status: "Current"
    as_of: "July 2026"
    notes: "Safety is added as distributed terminals plus safety logic rather than as a separate safety-CPU hardware family."
