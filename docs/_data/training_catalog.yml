topic_groups:
  - key: "fundamentals"
    label: "Electrical Fundamentals"
    url: "/training/fundamentals/"
    description: "Circuit theory, analysis methods, passive components, switching devices, conductor sizing, and IEC earthing systems."
    module_count: 9
  - key: "electrical-machines"
    label: "Motors, Drives, and Motion"
    url: "/training/electrical-machines/"
    description: "Induction and DC motors, VFDs, servo drives, motor selection, efficiency, and equations."
    module_count: 13
  - key: "nec-application"
    label: "NEC for Machines and Panels"
    url: "/training/nec-application/"
    description: "NEC code reading, table navigation, and article routing for motor and panel work."
    module_count: 11
  - key: "control-systems"
    label: "Control Systems"
    url: "/training/control-systems/"
    description: "Control theory, PID intuition, industrial PLC implementation, loop architectures, and applied heater and motion-control examples."
    module_count: 7

related_standards:
  - title: "NEC (NFPA 70)"
    url: "/standards/us-electrical/nec/"
