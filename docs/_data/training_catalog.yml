---
# Training catalog — Phase 14
# Source of truth for module metadata, learning paths, and landing-page copy.
# URLs must stay aligned with actual Jekyll page paths.

intro: >
  Practical training for industrial controls engineers, panel designers, and field
  service technicians. All material is derived from the RAG training layer and is
  intended as a study aid — not a substitute for the cited standards.

verification_note: >
  This material explains concepts and design patterns. For code compliance,
  always consult the current edition of the applicable standard and your AHJ.
  See the trust boundary note at the bottom of this page.

start_here:
  - audience: "New to industrial controls"
    description: "Start with circuit language, then Kirchhoff's laws and passive components."
    entry_modules:
      - title: "Electrical Quantities and Circuit Language"
        url: "/fundamentals/electrical/electrical-quantities/"
      - title: "Kirchhoff's Laws and Systematic Analysis"
        url: "/fundamentals/electrical/kirchhoff-laws/"
  - audience: "Working with motors and drives"
    description: "Jump to induction motor basics, then VFD and servo fundamentals."
    entry_modules:
      - title: "Induction Motor Basics"
        url: "/fundamentals/motors/induction-motor-basics/"
      - title: "VFD Fundamentals"
        url: "/fundamentals/motors/vfd-fundamentals/"
  - audience: "Designing control panels or machines"
    description: "Start with NEC code reading, then motor and panel code application."
