modules:
  # ── Fundamentals ────────────────────────────────────────────────────────────
  - title: "Electrical Quantities and Circuit Language"
    url: "/fundamentals/electrical/electrical-quantities/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Build the shared vocabulary — voltage, current, resistance, power — and learn to read circuit topology before solving anything."
    level: "Beginner"
    time: "20 min"
    focus: "Controls / Panel Design"
    type: "Concept"
    prerequisites: []
    featured: true
    related_workflows:
      - title: "Electrical Review Workflow"
        url: "/design/workflows/electrical-review/"
    related_checklists:
      - title: "Basic Circuit Polarity and Power Checks"
        url: "/implementation/commissioning-templates/basic-circuit-polarity/"

