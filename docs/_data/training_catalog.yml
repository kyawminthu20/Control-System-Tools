  - title: "UL 508A"
    url: "/standards/us-electrical/ul-508a/"
    relevance: "Industrial control panel construction and component ratings"
  - title: "NFPA 79"
    url: "/standards/us-electrical/nfpa-79/"
    relevance: "Electrical equipment for industrial machinery"
  - title: "IEC 60204-1"
    url: "/standards/machinery/iec-60204-1/"
    relevance: "International equivalent to NFPA 79 for machine electrical equipment"

modules:
  # ── Fundamentals ────────────────────────────────────────────────────────────
  - title: "Electrical Quantities and Circuit Language"
    url: "/training/fundamentals/electrical-quantities/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Build the shared vocabulary — voltage, current, resistance, power — and learn to read circuit topology before solving anything."
    level: "Beginner"
    time: "20 min"
    focus: "Controls / Panel Design"
    type: "Concept"
    prerequisites: []
    featured: true
    related_workflows:
      - title: "Electrical Review Workflow"
        url: "/workflows/electrical-review/"

  - title: "Series, Parallel, and Divider Methods"
    url: "/training/fundamentals/series-parallel-dividers/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Reduce series and parallel networks and apply voltage and current dividers to find operating points in real circuits."
    level: "Beginner"
    time: "25 min"
    focus: "Controls / Panel Design"
    type: "Concept + Practice"
    prerequisites:
      - "Electrical Quantities and Circuit Language"
    related_workflows:
      - title: "Electrical Review Workflow"
        url: "/workflows/electrical-review/"

  - title: "Kirchhoff's Laws and Systematic Analysis"
    url: "/training/fundamentals/kirchhoff-laws/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Apply KCL and KVL with nodal and loop analysis to solve circuits that cannot be simplified by series/parallel rules alone."
    level: "Beginner"
    time: "30 min"
    focus: "Controls / Panel Design"
    type: "Concept + Practice"
    prerequisites:
      - "Series, Parallel, and Divider Methods"
    featured: true

  - title: "Equivalent Circuit Methods"
    url: "/training/fundamentals/equivalent-circuit-methods/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Simplify complex networks to Thevenin or Norton equivalents; apply source transformation and superposition for multi-source problems."
    level: "Intermediate"
    time: "30 min"
    focus: "Controls / Panel Design"
    type: "Concept + Practice"
    prerequisites:
      - "Kirchhoff's Laws and Systematic Analysis"

  - title: "Electrical Equations Reference"
    url: "/training/fundamentals/electrical-equations-reference/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Quick-reference sheet for Ohm's law, power, dividers, KCL/KVL, and capacitor/inductor energy — formatted for fast lookup."
    level: "Beginner"
    time: "10 min"
    focus: "Controls / Panel Design"
    type: "Reference"
    prerequisites: []

  - title: "Passive Components"
    url: "/training/fundamentals/passive-components/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Understand resistors, capacitors, and inductors — their ratings, stored energy, and behavior in DC and AC circuits."
    level: "Beginner"
    time: "20 min"
    focus: "Controls / Panel Design"
    type: "Concept"
    prerequisites:
      - "Electrical Quantities and Circuit Language"

  - title: "Diodes, Transistors, and Switching Basics"
    url: "/training/fundamentals/diodes-transistors/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Cover diode families, BJT/MOSFET/IGBT switching modes, and flyback diodes — the semiconductor layer under every drive and power supply."
    level: "Intermediate"
    time: "25 min"
    focus: "Controls / Panel Design"
    type: "Concept"
    prerequisites:
      - "Passive Components"

  - title: "Conductor Ampacity and Termination Temperature"
    url: "/training/fundamentals/conductor-ampacity/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Read NEC ampacity tables correctly, apply correction factors, and understand the 60/75°C termination temperature rule."
    level: "Beginner"
    time: "20 min"
    focus: "Panel Design / NEC"
    type: "Code Application"
    prerequisites: []
    featured: true

  - title: "IEC Earthing System Types"
    url: "/training/fundamentals/earthing-systems-iec/"
    group: "fundamentals"
    group_label: "Electrical Fundamentals"
    summary: "Understand how TN-C, TT, TN-C-S, TN-S, and IT earthing systems affect fault-current path, protective-device selection, and touch-voltage risk in machine and panel design."
    level: "Beginner"
    time: "20 min"
    focus: "Controls / Panel Design"
    type: "Concept"
    prerequisites:
      - "Electrical Quantities and Circuit Language"
    featured: false
    related_workflows:
      - title: "Electrical Review Workflow"
        url: "/workflows/electrical-review/"

