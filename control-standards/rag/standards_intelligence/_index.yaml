notes: |
  This index routes the grouped standards layout introduced on 2026-03-05.

  For US industrial control panels:
    - Start with NEC Article 409
    - Use UL 508A for construction and listing
    - Use NFPA 79 for machinery context

  For international machinery:
    - Start with IEC 60204-1
    - Use ISO 13849-1 or IEC 62061 for safety functions
    - Use ISO 12100 for risk assessment
    - Use routing/standards_applicability.md for project and market routing
    - Use reference_models/software_safety_and_intrinsic_safety_standards.md for safety PLC software, redundancy, and intrinsic-safety routing

  For hazardous-area projects:
    - Use IEC 60079 for Ex equipment, area classification, installation, and inspection
    - Coordinate with NEC hazardous-location articles for US installations

  For semiconductor equipment:
    - Use SEMI S2 / S8 / S14 with IEC 60204-1, NFPA 79, and ISO 12100
    - Add IEC 62443 when the tool is networked or remotely supported

