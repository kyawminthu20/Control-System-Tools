notes: |
  IEC 60204-1 is the international standard for electrical equipment of machines.
  It is the direct equivalent of NFPA 79 for global/EU markets.

  Key differences from NFPA 79:
  - Uses "clauses" instead of "chapters"
  - Global jurisdiction vs US-specific
  - Different voltage standards
  - Different component certification (CE vs UL)
  - Pairs with ISO 13849/IEC 62061 for safety (vs NFPA 79 standalone)

