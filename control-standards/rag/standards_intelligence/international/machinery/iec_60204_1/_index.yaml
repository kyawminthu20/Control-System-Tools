notes: |
  IEC 60204-1 is the international standard for the electrical equipment of machines and
  the counterpart of NFPA 79 for global/EU markets.

  Scope: applies to electrical equipment operating at nominal supply voltages not exceeding
  1 000 V AC or 1 500 V DC, at nominal supply frequencies not exceeding 200 Hz. Requirements
  commence at the point of connection of the supply to the electrical equipment of the
  machine. THERE IS NO LOWER VOLTAGE THRESHOLD in the scope — an earlier version of this
  corpus and the site page wrongly stated "above 25 V AC or 60 V DC".

  Stop functions (Clause 9) may be Category 0, 1 or 2. An EMERGENCY STOP function is
  restricted to Category 0 or Category 1, selected by risk assessment; Category 2 leaves
  power on the actuators and is not an emergency-stop category. (Flagged for confirmation
  against the purchased Clause 9.2.2/9.2.3 text — the free IEC preview truncates before it.)

