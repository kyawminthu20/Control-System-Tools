requirements:
  - id: MMD-001
    title: Main machine disconnect
    shall_statement: The machine shall provide a single main electrical disconnect that is external to the enclosure, clearly marked, and lockable in the OFF position.
    subsystem: incoming_power
    verification_method: inspection_and_functional_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch05__disconnecting_means.md#1-main-disconnect-requirements"
      - "us/nfpa79/NFPA79_2024__Ch05__disconnecting_means.md#3-lockout--tagout-loto-implications"
    industry_tags: [all, us]

  - id: MMD-002
    title: Disconnect accessibility
    shall_statement: The main disconnect shall be readily accessible and located at the machine point of supply.
    subsystem: incoming_power
    verification_method: layout_review_and_site_inspection
    standard_refs:
      - "us/nec/NEC_2023__Art670__industrial_machinery.md#1-machine-disconnecting-means"
      - "us/nfpa79/NFPA79_2024__Ch05__disconnecting_means.md#2-location-and-accessibility"
    industry_tags: [all, us]

  - id: MMD-003
    title: No automatic restart
    shall_statement: Restoration of power after an outage shall not cause the machine to restart automatically.
    subsystem: safety_control
    verification_method: power_cycle_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch09__control_circuits_and_control_functions.md#1-startstop-behavior"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause09__control_circuits_and_functions.md#1-startstop-behavior"
    industry_tags: [all]

  - id: MMD-004
    title: Reset shall not restart
    shall_statement: Reset of an emergency stop or safety trip shall not restart the machine and shall only permit a separate deliberate start command.
    subsystem: safety_control
    verification_method: functional_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch09__control_circuits_and_control_functions.md#2-emergency-stop-concepts"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause03__terms_and_definitions.md#2-common-misinterpretations"
    industry_tags: [all]

  - id: MMD-005
    title: Safety path independence
    shall_statement: Safety-related control functions shall remain capable of performing their task regardless of the state of the standard PLC or HMI.
    subsystem: safety_control
    verification_method: architecture_review_and_functional_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch09__control_circuits_and_control_functions.md#3-safety-vs-standard-control-separation"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause09__control_circuits_and_functions.md#3-safety-vs-standard-control-separation"
    industry_tags: [all]

  - id: MMD-006
    title: Physical emergency stop devices
    shall_statement: The machine shall provide physical emergency stop devices at operator locations, and the HMI shall not be the sole means of emergency stopping.
    subsystem: operator_interface
    verification_method: inspection_and_functional_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch10__operator_interface_devices.md#2-ergonomics-and-safety"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause10__operator_interface.md#2-ergonomic-considerations"
    industry_tags: [all]

  - id: MMD-007
    title: Hazardous-motion start protection
    shall_statement: Devices that initiate hazardous motion shall be guarded, shrouded, or recessed to prevent accidental operation.
    subsystem: operator_interface
    verification_method: inspection
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch10__operator_interface_devices.md#2-ergonomics-and-safety"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause10__operator_interface.md#2-ergonomic-considerations"
    industry_tags: [all]

  - id: MMD-008
    title: SCCR marking
    shall_statement: The main control panel shall be marked with its SCCR and that SCCR shall be equal to or greater than the available fault current at the installation site.
    subsystem: control_panel
    verification_method: calculation_review_and_site_document_review
    standard_refs:
      - "us/nec/NEC_2023__Art409__industrial_control_panels.md#2-short-circuit-current-rating-sccr"
    industry_tags: [all, us]

  - id: MMD-009
    title: Panel nameplate content
    shall_statement: The control panel nameplate shall identify manufacturer, voltage, phases, frequency, full-load current, SCCR, enclosure type, and grounding terminal information.
    subsystem: control_panel
    verification_method: document_review_and_inspection
    standard_refs:
      - "us/nec/NEC_2023__Art409__industrial_control_panels.md#3-labeling-requirements"
    industry_tags: [all, us]

  - id: MMD-010
    title: Equipment grounding conductor sizing
    shall_statement: Equipment grounding conductors shall be sized to the rating of the upstream overcurrent device and shall be identified as green or green/yellow when insulated.
    subsystem: grounding_bonding
    verification_method: calculation_review_and_inspection
    standard_refs:
      - "us/nec/NEC_2023__Art250__grounding_and_bonding.md#1-equipment-grounding-conductors-egc"
    industry_tags: [all, us]

  - id: MMD-011
    title: Door bonding
    shall_statement: Hinged doors and movable conductive parts carrying electrical devices shall be bonded with dedicated bonding jumpers and shall not rely on hinges as the sole fault path.
    subsystem: grounding_bonding
    verification_method: inspection_and_continuity_test
    standard_refs:
      - "us/nec/NEC_2023__Art250__grounding_and_bonding.md#2-bonding-of-enclosures-and-doors"
      - "us/nfpa79/NFPA79_2024__Ch08__grounding_and_bonding.md#1-protective-bonding-rules"
    industry_tags: [all]

  - id: MMD-012
    title: Bonding contact integrity
    shall_statement: Bonding contact points shall provide metal-to-metal continuity by removing nonconductive coatings or using suitable grounding hardware.
    subsystem: grounding_bonding
    verification_method: inspection
    standard_refs:
      - "us/nec/NEC_2023__Art250__grounding_and_bonding.md#2-bonding-of-enclosures-and-doors"
    industry_tags: [all]

  - id: MMD-013
    title: Conductor ampacity and termination rating
    shall_statement: Conductors shall be sized using applicable ampacity, ambient, bundling, and terminal-temperature rules and shall not exceed terminal temperature ratings.
    subsystem: power_distribution
    verification_method: calculation_review
    standard_refs:
      - "us/nec/NEC_2023__Art310__conductors_for_general_wiring.md#1-ampacity-and-derating"
      - "us/nec/NEC_2023__Art310__conductors_for_general_wiring.md#2-temperature-ratings"
    industry_tags: [all, us]

  - id: MMD-014
    title: Branch overcurrent protection
    shall_statement: Conductors shall be protected at their source, and supplementary protectors shall not be used as substitutes for branch-circuit overcurrent devices.
    subsystem: power_distribution
    verification_method: schematic_review_and_inspection
    standard_refs:
      - "us/nec/NEC_2023__Art240__overcurrent_protection.md#1-overcurrent-device-selection"
    industry_tags: [all, us]

  - id: MMD-015
    title: Circuit routing and abrasion protection
    shall_statement: Conductors of the same circuit shall be routed together and shall be protected from abrasion or physical damage at enclosure entries.
    subsystem: wiring_methods
    verification_method: inspection
    standard_refs:
      - "us/nec/NEC_2023__Art300__general_wiring_methods.md#1-routing-and-protection-rules"
    industry_tags: [all, us]

  - id: MMD-016
    title: Class 2 circuit segregation
    shall_statement: Class 2 or other power-limited control circuits shall be segregated from power circuits unless a code-permitted barrier or insulation exception is applied.
    subsystem: control_power
    verification_method: inspection_and_drawing_review
    standard_refs:
      - "us/nec/NEC_2023__Art725__class_1_2_3_control_circuits.md#2-separation-from-power-circuits-725136"
    industry_tags: [all, us]

  - id: MMD-017
    title: Control power isolation and protection
    shall_statement: Control transformers and DC power supplies shall be isolated, short-circuit protected, and sized for steady-state and inrush loads.
    subsystem: control_power
    verification_method: schematic_review_and_functional_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch15__transformers_and_power_supplies.md#1-control-power-architectures"
    industry_tags: [all]

  - id: MMD-018
    title: Residual-voltage protection
    shall_statement: Stored electrical energy shall discharge below 60 V within 5 seconds after power removal or the enclosure shall display the required wait time.
    subsystem: electrical_safety
    verification_method: residual_voltage_test_and_label_inspection
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch07__protection_against_electric_shock.md#1-protective-measures"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause06__protection_against_electric_shock.md#1-protective-measures"
    industry_tags: [all]

  - id: MMD-019
    title: Panel layout separation
    shall_statement: The control panel layout shall separate high-voltage power equipment from low-voltage control electronics and provide adequate space for cooling and service access.
    subsystem: control_panel
    verification_method: layout_review
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch11__control_equipment.md#1-panel-construction-implications"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause11__controlgear.md#1-enclosures-and-layout"
    industry_tags: [all]

  - id: MMD-020
    title: Component and conductor identification
    shall_statement: Components, terminals, and conductors shall be identified so the field installation matches the electrical schematics and maintenance documentation.
    subsystem: documentation
    verification_method: document_review_and_inspection
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch19__marking_and_documentation.md#1-labeling-requirements"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause16__marking_and_warning_signs.md#1-identification-and-labels"
    industry_tags: [all]

  - id: MMD-021
    title: Hydraulic safety trip safe state
    shall_statement: A safety demand affecting hydraulic motion shall remove motive power and command the hydraulic subsystem to its defined safe state with a documented depressurization path.
    subsystem: hydraulic_system
    verification_method: functional_test_and_pressure_decay_review
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch09__control_circuits_and_control_functions.md#0-control-philosophy"
      - "TO VERIFY: ISO 4413"
    industry_tags: [all, hydraulic]

  - id: MMD-022
    title: Chemical high-high shutdown
    shall_statement: Independent high-high level or equivalent overflow protection shall stop chemical dosing and require deliberate recovery steps before restart.
    subsystem: chemical_system
    verification_method: simulated_trip_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch09__control_circuits_and_control_functions.md#3-safety-vs-standard-control-separation"
      - "TO VERIFY: IEC 61511"
      - "TO VERIFY: application-specific chemical handling standard"
    industry_tags: [all, chemical, energy, petroleum, food_beverage, medical]

  - id: MMD-023
    title: Chemical leak shutdown
    shall_statement: Leak detection in chemical containment shall stop dosing, latch an alarm, and block restart until the leak condition is cleared and acknowledged.
    subsystem: chemical_system
    verification_method: simulated_leak_test
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch03__general_requirements.md#0-safety-philosophy"
      - "TO VERIFY: application-specific chemical handling standard"
    industry_tags: [all, chemical]

  - id: MMD-024
    title: Non-safety logger boundary
    shall_statement: The logger or historian shall not be capable of inhibiting or replacing the safety path.
    subsystem: network_logging
    verification_method: architecture_review
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch09__control_circuits_and_control_functions.md#3-safety-vs-standard-control-separation"
    industry_tags: [all]

  - id: MMD-025
    title: Safety communication integrity
    shall_statement: If safety-related signals are transmitted over a network, the network shall use a safety protocol suitable for black-channel safety communication.
    subsystem: network_logging
    verification_method: architecture_review_and_protocol_review
    standard_refs:
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause09__control_circuits_and_functions.md#3-safety-vs-standard-control-separation"
    industry_tags: [all]

  - id: MMD-026
    title: External source identification
    shall_statement: External signals or power sources entering a panel that are not removed by the panel main disconnect shall be clearly identified.
    subsystem: integrated_systems
    verification_method: drawing_review_and_inspection
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch20__system_integration.md#1-subsystem-coordination"
    industry_tags: [all, integrated_system]

  - id: MMD-027
    title: Environment-matched enclosure
    shall_statement: Enclosures and operator devices shall be selected to match the expected contaminants and environmental conditions, including washdown or corrosive service where applicable.
    subsystem: environmental_protection
    verification_method: environmental_review_and_inspection
    standard_refs:
      - "us/nfpa79/NFPA79_2024__Ch04__general_conditions_of_installation.md#0-environmental-considerations"
      - "us/nfpa79/NFPA79_2024__Ch10__operator_interface_devices.md#1-control-device-requirements"
    industry_tags: [all, wet, corrosive, food_beverage, marine, offshore]

  - id: MMD-028
    title: Verification record package
    shall_statement: The machine shall be delivered with verification records, electrical schematics, safety-function descriptions, maintenance instructions, and test intervals.
    subsystem: documentation
    verification_method: document_package_review
    standard_refs:
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause16__marking_and_warning_signs.md#2-documentation-set"
      - "us/nfpa79/NFPA79_2024__Ch19__marking_and_documentation.md#2-documentation-expectations"
      - "international/machinery/iec_60204_1/IEC60204_1_2016A1__Clause18__verification.md#0-purpose"
    industry_tags: [all]
