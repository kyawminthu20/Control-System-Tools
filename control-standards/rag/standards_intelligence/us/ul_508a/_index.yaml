# Common UL inspection focus areas
inspection_priorities:
  - section: "SB"
    focus: "SCCR calculation and label"
    common_failures: "Missing SCCR label, incorrect calculation, weakest link not identified"

  - section: "8"
    focus: "Nameplate markings complete and correct"
    common_failures: "Missing voltage, missing SCCR, missing manufacturer info"

  - section: "4"
    focus: "Live parts spacing meets voltage requirements"
    common_failures: "Insufficient clearance, improper mounting proximity"

  - section: "7"
    focus: "Equipment grounding conductor sizing, bonding"
    common_failures: "Undersized EGC, poor door bonding, missing bonding jumpers"

  - section: "5"
    focus: "Wire sizing, termination temperature ratings"
    common_failures: "Undersized conductors, wrong ampacity table used"

# UL 508A specific topics (unique to this standard)
