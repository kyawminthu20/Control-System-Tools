    sections: ["4"]
    complexity: "medium"
    automation_potential: "yes"

  wire_sizing_method:
    description: "UL-specific conductor sizing (differs slightly from NEC)"
    sections: ["5"]
    complexity: "medium"
    automation_potential: "yes"

  panel_construction:
    description: "Mechanical and assembly requirements"
    sections: ["2"]
    complexity: "low"
    automation_potential: "partial"

notes: |
  UL 508A is the definitive standard for industrial control panels in North America.
  It works in conjunction with NEC Article 409 and overlaps significantly with NFPA 79 Chapter 11.

  Key differences from other standards:
  - SCCR calculation is unique to UL 508A (Supplement SB)
  - Wire sizing methods differ slightly from NEC
  - Spacing tables are specific to UL 508A
  - Panel construction details more prescriptive than NEC

  All files are in DRAFT status and ready for content development.
